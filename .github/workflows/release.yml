name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/create-gh-release-action@eba8ea96c86cca8a37f1b56e94b4d13301fba651 # v1.11.0
        with:
          # Tags like v1.2.3 / v1.2.3-rc.1 become the release version.
          token: ${{ secrets.GITHUB_TOKEN }}

  upload-assets:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        # One asset per (binary × target). Each front-end binary (cccc-es from
        # cccc-es-cli, cccc-rs from cccc-rs-cli, cccc-go from cccc-go-cli) is
        # built for every target; the `include` entries attach the runner OS to
        # each target.
        bin:
          - cccc-es
          - cccc-rs
          - cccc-go
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - x86_64-apple-darwin
          - aarch64-apple-darwin
          - x86_64-pc-windows-msvc
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: taiki-e/upload-rust-binary-action@dd5bbe0528f32a483b749797277ab6ef83a29999
        with:
          # The binary to build/upload for this matrix leg (cccc-es / cccc-rs / cccc-go).
          bin: ${{ matrix.bin }}
          target: ${{ matrix.target }}
          # Archive name: cccc-es-<tag>-<target>.{tar.gz,zip}
          archive: $bin-$tag-$target
          # Bundle docs/license alongside the binary in the archive.
          include: README.md,LICENSE
          # Emit a .sha256 file next to each asset.
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
